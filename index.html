<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>World</title>
    <style>
        :root {
            --bg-dark: #2c2c2c;
            --morandi-gray: #9ca3af;
            --paper: #fdfdfd;
            --glass: rgba(255, 255, 255, 0.12);
            --text-main: #333333;
            --border: #e5e7eb;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; user-select: none; -webkit-tap-highlight-color: transparent; }
        body, html { height: 100%; overflow: hidden; background: #000; }

        /* --- Screens --- */
        .screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.6s ease; z-index: 10; }
        .active { display: flex; opacity: 1; }

        /* --- Home --- */
        #screen-home { 
            background: linear-gradient(-45deg, #1a1a1a, #4a4a4a, #ffffff, #d3d3d3); 
            background-size: 400% 400%; 
            animation: gradientBG 15s ease infinite; 
            z-index: 20;
        }
        @keyframes gradientBG { 0% {background-position:0% 50%} 50% {background-position:100% 50%} 100% {background-position:0% 50%} }
        
        .title { position: absolute; top: 15%; font-size: 3.5rem; font-weight: 100; letter-spacing: 15px; color: #fff; mix-blend-mode: difference; z-index: 30; }
        .glass-box { background: var(--glass); backdrop-filter: blur(15px); padding: 60px 80px; border: 1px solid rgba(255,255,255,0.1); border-radius: 4px; }
        .menu-item { margin: 25px 0; letter-spacing: 5px; font-size: 0.9rem; color: #444; cursor: pointer; transition: 0.4s; text-align: center; }
        .menu-item:hover { color: #000; transform: translateY(-2px); }

        /* --- Start (Canvas & Layers) --- */
        #screen-start { background: var(--paper); z-index: 15; }
        #canvas-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: var(--paper); }
        canvas { position: absolute; top: 0; left: 0; touch-action: none; }

        .exit-btn { position: absolute; top: 40px; left: 40px; cursor: pointer; font-size: 0.7rem; letter-spacing: 3px; color: var(--text-main); border-bottom: 1px solid rgba(0,0,0,0.1); z-index: 2000; }

        /* Layer Panel */
        .layer-panel {
            position: absolute; right: 20px; top: 50%; transform: translateY(-50%);
            width: 200px; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px);
            border: 1px solid var(--border); padding: 15px; z-index: 1500; border-radius: 2px;
        }
        .layer-item { font-size: 0.65rem; padding: 10px; border-bottom: 1px solid #f0f0f0; display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
        .layer-active { background: #f5f5f5; border-left: 3px solid var(--morandi-gray); }
        .layer-controls { display: flex; gap: 8px; align-items: center; }

        /* Minimalist CSS Icons */
        .icon { width: 14px; height: 14px; border: 1.2px solid #888; position: relative; cursor: pointer; }
        .icon-eye { border-radius: 80% 20%; transform: rotate(45deg); }
        .icon-eye.hidden { opacity: 0.2; }
        .icon-copy { border-radius: 1px; }
        .icon-copy::after { content:''; position:absolute; top:-3px; right:-3px; width:10px; height:10px; border:1.2px solid #888; }
        .icon-del { border: none; }
        .icon-del::before, .icon-del::after { content:''; position:absolute; top:50%; width:100%; height:1.2px; background:#888; transform:rotate(45deg); }
        .icon-del::after { transform:rotate(-45deg); }

        .toolbar {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 20px; background: rgba(255,255,255,0.85);
            padding: 12px 25px; align-items: center; border: 1px solid var(--border); z-index: 1500;
        }
        .tool-btn { font-size: 0.7rem; color: #888; cursor: pointer; letter-spacing: 1px; }
        input[type="color"] { border:none; width:18px; height:18px; background:none; cursor:pointer; }
        input[type="range"] { width: 60px; accent-color: #999; }

        /* --- Rest & Others --- */
        #screen-rest { background: linear-gradient(to bottom, #111, #fff); }
        .floating-text { position: absolute; pointer-events: none; animation: fadeOut 3s forwards; font-size: 0.85rem; letter-spacing: 2px; color: #333; font-weight: 300; }
        @keyframes fadeOut { 0%{opacity:0} 15%{opacity:1} 85%{opacity:1} 100%{opacity:0; transform:translateY(-20px)} }

        .status-bar { position: absolute; bottom: 30px; right: 40px; font-size: 0.6rem; color: #aaa; letter-spacing: 2px; }
    </style>
</head>
<body>

    <section id="screen-home" class="screen active">
        <h1 class="title">WORLD</h1>
        <div class="glass-box">
            <div class="menu-item" onclick="nav('screen-start')">START</div>
            <div class="menu-item" onclick="nav('screen-rest')">REST</div>
            <div class="menu-item" onclick="nav('screen-end')">END</div>
            <div class="menu-item" onclick="nav('screen-setting')">SETTING</div>
        </div>
        <div class="status-bar" id="time-display">00:00:00</div>
    </section>

    <section id="screen-start" class="screen">
        <div class="exit-btn" onclick="nav('screen-home')">BACK</div>
        <div id="canvas-container"></div>
        
        <div class="layer-panel">
            <div style="font-size: 0.55rem; color: #bbb; margin-bottom: 10px; letter-spacing: 1px;">LAYERS (MAX 15)</div>
            <div id="layers-list"></div>
            <button onclick="addLayer()" style="width:100%; margin-top: 10px; font-size: 0.5rem; padding: 6px; cursor: pointer; background: #fff; border: 1px solid #ddd; color: #888; letter-spacing: 1px;">+ NEW LAYER</button>
        </div>

        <div class="toolbar">
            <input type="color" id="color" value="#6d7a71">
            <input type="range" id="size" min="1" max="50" value="2">
            <span class="tool-btn" onclick="setTool('pen')">PEN</span>
            <span class="tool-btn" onclick="setTool('eraser')">ERASER</span>
            <span class="tool-btn" onclick="undo()">UNDO</span>
            <span class="tool-btn" onclick="redo()">REDO</span>
        </div>
    </section>

    <section id="screen-rest" class="screen" onclick="spawnText(event)">
        <div class="exit-btn" onclick="nav('screen-home')">BACK</div>
        <div style="color: rgba(255,255,255,0.1); letter-spacing: 15px; font-weight: 100;">SILENCE</div>
    </section>

    <section id="screen-end" class="screen">
        <div class="exit-btn" onclick="nav('screen-home')">BACK</div>
        <textarea id="note" style="width: 60%; height: 40%; background: transparent; border: none; border-left: 1px solid #ddd; padding: 20px; outline: none; font-size: 1.1rem; color: #555; line-height: 1.6;" placeholder="Type something..."></textarea>
    </section>

    <section id="screen-setting" class="screen">
        <div class="exit-btn" onclick="nav('screen-home')">BACK</div>
        <div class="menu-item" onclick="nav('screen-home')">FRUIT CUP</div>
        <div class="menu-item" onclick="toast('I love you')">MANGO</div>
        <div class="menu-item" onclick="toast('I love you too')">GRAPE</div>
    </section>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playThud() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            const filter = audioCtx.createBiquadFilter();
            filter.type = "lowpass"; filter.frequency.value = 400;
            osc.type = 'triangle'; osc.frequency.setValueAtTime(150, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.12);
            gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
            osc.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.2);
        }

        function nav(id) {
            playThud();
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'screen-start' && !window.canvasInit) initLayerSystem();
        }

        setInterval(() => {
            document.getElementById('time-display').innerText = new Date().toLocaleTimeString('en-GB');
        }, 1000);

        // --- Layer Logic ---
        let layers = [], activeIdx = 0, tool = 'pen', isDrawing = false;

        function initLayerSystem() {
            const container = document.getElementById('canvas-container');
            container.innerHTML = '';
            layers = [];
            window.canvasInit = true;
            addLayer(); // Create initial layer
        }

        function addLayer() {
            if (layers.length >= 15) return;
            const container = document.getElementById('canvas-container');
            const canvas = document.createElement('canvas');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            container.appendChild(canvas);

            const layer = {
                canvas: canvas,
                ctx: canvas.getContext('2d'),
                visible: true,
                undoStack: [],
                redoStack: []
            };
            
            // Set styles for the context
            layer.ctx.lineCap = 'round';
            layer.ctx.lineJoin = 'round';

            layers.push(layer);
            setActiveLayer(layers.length - 1);
            saveState();
        }

        function setActiveLayer(idx) {
            activeIdx = idx;
            layers.forEach((l, i) => {
                l.canvas.style.pointerEvents = (i === idx) ? 'auto' : 'none';
                l.canvas.style.zIndex = i;
            });
            
            const activeCanvas = layers[idx].canvas;
            // Attach Events
            activeCanvas.onmousedown = start;
            activeCanvas.onmousemove = move;
            activeCanvas.onmouseup = end;
            activeCanvas.ontouchstart = (e) => start(e.touches[0]);
            activeCanvas.ontouchmove = (e) => move(e.touches[0]);
            activeCanvas.ontouchend = end;

            updateLayerUI();
        }

        function updateLayerUI() {
            const list = document.getElementById('layers-list');
            list.innerHTML = '';
            layers.slice().reverse().forEach((l, i) => {
                const realIdx = layers.length - 1 - i;
                const div = document.createElement('div');
                div.className = `layer-item ${realIdx === activeIdx ? 'layer-active' : ''}`;
                div.innerHTML = `
                    <span onclick="setActiveLayer(${realIdx})">LAYER ${realIdx + 1}</span>
                    <div class="layer-controls">
                        <div class="icon icon-eye ${l.visible?'':'hidden'}" onclick="toggleVis(${realIdx})"></div>
                        <div class="icon icon-del" onclick="delLayer(${realIdx})"></div>
                    </div>
                `;
                list.appendChild(div);
            });
        }

        function start(e) {
            isDrawing = true;
            const l = layers[activeIdx];
            l.ctx.beginPath();
            l.ctx.moveTo(e.clientX, e.clientY);
            l.redoStack = []; 
        }

        function move(e) {
            if (!isDrawing) return;
            const l = layers[activeIdx];
            l.ctx.lineWidth = document.getElementById('size').value;
            l.ctx.strokeStyle = (tool === 'eraser') ? '#fdfdfd' : document.getElementById('color').value;
            l.ctx.lineTo(e.clientX, e.clientY);
            l.ctx.stroke();
        }

        function end() {
            if (isDrawing) {
                isDrawing = false;
                saveState();
            }
        }

        function saveState() {
            const l = layers[activeIdx];
            if (l.undoStack.length > 20) l.undoStack.shift();
            l.undoStack.push(l.canvas.toDataURL());
        }

        function undo() {
            const l = layers[activeIdx];
            if (l.undoStack.length > 1) {
                playThud();
                l.redoStack.push(l.undoStack.pop());
                const img = new Image();
                img.src = l.undoStack[l.undoStack.length - 1];
                img.onload = () => {
                    l.ctx.clearRect(0,0,l.canvas.width, l.canvas.height);
                    l.ctx.drawImage(img,0,0);
                };
            }
        }

        function redo() {
            const l = layers[activeIdx];
            if (l.redoStack.length > 0) {
                playThud();
                const state = l.redoStack.pop();
                l.undoStack.push(state);
                const img = new Image();
                img.src = state;
                img.onload = () => {
                    l.ctx.clearRect(0,0,l.canvas.width, l.canvas.height);
                    l.ctx.drawImage(img,0,0);
                };
            }
        }

        function toggleVis(idx) {
            layers[idx].visible = !layers[idx].visible;
            layers[idx].canvas.style.display = layers[idx].visible ? 'block' : 'none';
            updateLayerUI();
        }

        function delLayer(idx) {
            if (layers.length <= 1) return;
            document.getElementById('canvas-container').removeChild(layers[idx].canvas);
            layers.splice(idx, 1);
            setActiveLayer(Math.max(0, idx - 1));
        }

        function setTool(t) { tool = t; playThud(); }

        function spawnText(e) {
            const t = document.createElement('div'); t.className = 'floating-text';
            t.innerText = "I love 15/16"; t.style.left = e.clientX + 'px'; t.style.top = e.clientY + 'px';
            document.getElementById('screen-rest').appendChild(t);
            setTimeout(() => t.remove(), 3000);
        }

        function toast(msg) {
            const div = document.createElement('div'); div.className = 'floating-text';
            div.style.bottom = '20%'; div.style.left = '50%'; div.style.transform = 'translateX(-50%)';
            div.innerText = msg; document.body.appendChild(div);
            playThud(); setTimeout(() => div.remove(), 3000);
        }

        document.getElementById('note').addEventListener('input', () => {
            const osc = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            osc.frequency.value = 200; g.gain.setValueAtTime(0.02, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
            osc.connect(g); g.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + 0.05);
        });
    </script>
</body>
</html>
