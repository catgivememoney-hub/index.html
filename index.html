<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World</title>
    <style>
        :root {
            --bg-dark: #2c2c2c;
            --morandi-gray: #9ca3af;
            --paper: #fdfdfd;
            --glass: rgba(255, 255, 255, 0.1);
            --text: #444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; user-select: none; }
        body, html { height: 100%; overflow: hidden; background: #000; }

        .screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.8s ease;
        }
        .active { display: flex; opacity: 1; }

        /* Universal UI */
        .exit-btn { position: absolute; top: 40px; left: 40px; cursor: pointer; font-size: 0.7rem; letter-spacing: 3px; color: var(--text); z-index: 1000; }

        /* HOME */
        #screen-home {
            background: linear-gradient(-45deg, #1a1a1a, #4a4a4a, #ffffff, #d3d3d3);
            background-size: 400% 400%; animation: gradientBG 15s ease infinite;
        }
        @keyframes gradientBG { 0% {background-position:0% 50%} 50% {background-position:100% 50%} 100% {background-position:0% 50%} }
        .glass-box { background: var(--glass); backdrop-filter: blur(15px); padding: 50px 70px; border: 1px solid rgba(255,255,255,0.1); }
        .menu-item { margin: 20px 0; letter-spacing: 5px; font-size: 0.9rem; color: #444; cursor: pointer; transition: 0.3s; text-align: center; }
        .menu-item:hover { color: #000; letter-spacing: 7px; }

        /* START - Layers & Canvas */
        #screen-start { background: var(--paper); }
        #canvas-container { position: relative; width: 100%; height: 100%; }
        canvas { position: absolute; top: 0; left: 0; cursor: crosshair; touch-action: none; }
        
        .layer-panel {
            position: absolute; right: 20px; top: 50%; transform: translateY(-50%);
            width: 150px; background: rgba(255,255,255,0.8); backdrop-filter: blur(5px);
            padding: 15px; border: 1px solid #eee; display: flex; flex-direction: column; gap: 10px; z-index: 100;
        }
        .layer-item { font-size: 0.6rem; padding: 5px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; cursor: pointer; }
        .layer-active { background: #f0f0f0; border-left: 2px solid #999; }

        /* REST - Sound Box */
        #screen-rest { background: linear-gradient(to bottom, #111, #fff); }
        .sound-box {
            background: var(--glass); backdrop-filter: blur(10px);
            padding: 30px; border: 1px solid rgba(255,255,255,0.2);
            display: flex; flex-direction: column; align-items: center; gap: 20px;
        }
        .sound-icons { display: flex; gap: 20px; font-size: 1.2rem; color: #fff; mix-blend-mode: difference; }
        .sound-btn { cursor: pointer; opacity: 0.5; transition: 0.3s; }
        .sound-btn.playing { opacity: 1; transform: scale(1.2); }

        /* General UI Elements */
        .toolbar { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); display: flex; gap: 15px; padding: 10px 20px; background: rgba(255,255,255,0.8); z-index: 100; align-items: center;}
        input[type="range"] { accent-color: #999; width: 80px; }
        .floating-text { position: absolute; pointer-events: none; animation: fadeOut 3s forwards; font-size: 0.8rem; letter-spacing: 2px; }
        @keyframes fadeOut { 0%{opacity:0} 10%{opacity:1} 90%{opacity:1} 100%{opacity:0; transform:translateY(-20px)} }
    </style>
</head>
<body>

    <section id="screen-home" class="screen active">
        <div class="glass-box">
            <div class="menu-item" onclick="nav('screen-start')">START</div>
            <div class="menu-item" onclick="nav('screen-rest')">REST</div>
            <div class="menu-item" onclick="nav('screen-end')">END</div>
            <div class="menu-item" onclick="nav('screen-setting')">SETTING</div>
        </div>
    </section>

    <section id="screen-start" class="screen">
        <div class="exit-btn" onclick="nav('screen-home')">EXIT</div>
        <div id="canvas-container"></div>
        <div class="layer-panel" id="layer-panel">
            <div style="font-size: 0.6rem; color: #999; margin-bottom: 5px;">LAYERS (Max 15)</div>
            <div id="layers-list"></div>
            <button onclick="addLayer()" style="font-size: 0.5rem; cursor: pointer; background: none; border: 1px solid #ccc;">+ NEW LAYER</button>
        </div>
        <div class="toolbar">
            <input type="color" id="pen-color" value="#8e9775" style="border:none; width:20px; height:20px; background:none;">
            <input type="range" id="pen-size" min="1" max="50" value="2">
            <span onclick="setMode('pen')" style="cursor:pointer; font-size: 0.7rem;">PEN</span>
            <span onclick="setMode('eraser')" style="cursor:pointer; font-size: 0.7rem;">ERASER</span>
            <span onclick="toggleRuler()" id="ruler-btn" style="cursor:pointer; font-size: 0.7rem;">RULER</span>
            <span onclick="undo()" style="cursor:pointer; font-size: 0.7rem;">UNDO</span>
        </div>
    </section>

    <section id="screen-rest" class="screen" onclick="spawnRestText(event)">
        <div class="exit-btn" onclick="nav('screen-home')">EXIT</div>
        <div class="sound-box" onclick="event.stopPropagation()">
            <div class="sound-icons">
                <span class="sound-btn" onclick="toggleAmbience('rain', this)">🌧</span>
                <span class="sound-btn" onclick="toggleAmbience('stream', this)">🌊</span>
                <span class="sound-btn" onclick="toggleAmbience('ocean', this)">🏖</span>
                <span class="sound-btn" onclick="toggleAmbience('wind', this)">🍃</span>
            </div>
            <input type="range" min="0" max="1" step="0.1" value="0.5" oninput="setAmbienceVolume(this.value)">
            <div id="ambience-status" style="font-size: 0.6rem; color: #666; letter-spacing: 2px;">PAUSED</div>
        </div>
    </section>

    <section id="screen-end" class="screen">
        <div class="exit-btn" onclick="nav('screen-home')">EXIT</div>
        <div style="width: 60%; height: 50%;">
            <input type="range" min="12" max="60" value="20" oninput="document.getElementById('memo-area').style.fontSize = this.value+'px'" style="margin-bottom:20px;">
            <textarea id="memo-area" style="width:100%; height:100%; background:transparent; border:none; outline:none; font-size:20px; resize:none; line-height:1.6; border-left: 1px solid #ddd; padding-left: 20px;" placeholder="Type here..."></textarea>
        </div>
    </section>

    <section id="screen-setting" class="screen">
        <div class="exit-btn" onclick="nav('screen-home')">EXIT</div>
        <div class="menu-item" onclick="nav('screen-home')">FRUIT CUP</div>
        <div class="menu-item" onclick="settingTrigger('I love you')">MANGO</div>
        <div class="menu-item" onclick="settingTrigger('I love you too')">GRAPE</div>
    </section>

    <script>
        // --- AUDIO SYSTEM (Web Audio API) ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let ambienceNode = null;
        let ambienceGain = audioCtx.createGain();
        ambienceGain.connect(audioCtx.destination);

        // Matte Thud Sound (碰撞音)
        function playThud() {
            const osc = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            const filter = audioCtx.createBiquadFilter();
            
            filter.type = "lowpass";
            filter.frequency.value = 400;
            
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(150, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.1);
            
            g.gain.setValueAtTime(0.2, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
            
            osc.connect(filter);
            filter.connect(g);
            g.connect(audioCtx.destination);
            
            osc.start();
            osc.stop(audioCtx.currentTime + 0.2);
        }

        // Friction Sound (摩擦音)
        function playFriction(isActive) {
            if (!window.frictionNode) {
                const bufferSize = 2 * audioCtx.sampleRate;
                const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
                const output = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) output[i] = Math.random() * 2 - 1;
                
                window.frictionSource = audioCtx.createBufferSource();
                window.frictionSource.buffer = buffer;
                window.frictionSource.loop = true;
                
                window.frictionGain = audioCtx.createGain();
                window.frictionFilter = audioCtx.createBiquadFilter();
                window.frictionFilter.type = "bandpass";
                window.frictionFilter.frequency.value = 1000;
                
                window.frictionGain.gain.value = 0;
                window.frictionSource.connect(window.frictionFilter);
                window.frictionFilter.connect(window.frictionGain);
                window.frictionGain.connect(audioCtx.destination);
                window.frictionSource.start();
                window.frictionNode = true;
            }
            window.frictionGain.gain.setTargetAtTime(isActive ? 0.02 : 0, audioCtx.currentTime, 0.05);
        }

        // AMBIENCE SYNTHS
        function createNoiseNode() {
            const bufferSize = audioCtx.sampleRate * 2;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
            const noise = audioCtx.createBufferSource();
            noise.buffer = buffer; noise.loop = true;
            return noise;
        }

        function toggleAmbience(type, btn) {
            if (ambienceNode) {
                ambienceNode.stop();
                ambienceNode = null;
                document.querySelectorAll('.sound-btn').forEach(b => b.classList.remove('playing'));
                document.getElementById('ambience-status').innerText = "PAUSED";
                if (btn.dataset.type === type) { delete btn.dataset.type; return; }
            }
            
            playThud();
            const noise = createNoiseNode();
            const filter = audioCtx.createBiquadFilter();
            
            if (type === 'rain') { filter.type = "lowpass"; filter.frequency.value = 1200; }
            if (type === 'stream') { filter.type = "bandpass"; filter.frequency.value = 800; filter.Q.value = 1; }
            if (type === 'ocean') { 
                filter.type = "lowpass"; filter.frequency.value = 500;
                const lfo = audioCtx.createOscillator();
                const lfoGain = audioCtx.createGain();
                lfo.frequency.value = 0.2; lfoGain.gain.value = 300;
                lfo.connect(lfoGain); lfoGain.connect(filter.frequency); lfo.start();
            }
            if (type === 'wind') { filter.type = "lowpass"; filter.frequency.value = 400; filter.Q.value = 5; }

            noise.connect(filter);
            filter.connect(ambienceGain);
            noise.start();
            ambienceNode = noise;
            btn.classList.add('playing');
            btn.dataset.type = type;
            document.getElementById('ambience-status').innerText = type.toUpperCase();
        }

        function setAmbienceVolume(v) { ambienceGain.gain.value = v; }

        // --- NAVIGATION ---
        function nav(id) {
            playThud();
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if (id === 'screen-start' && !window.canvasInit) initLayerSystem();
        }

        // --- LAYER & CANVAS SYSTEM ---
        let layers = [];
        let activeLayerIndex = 0;
        let isDrawing = false;
        let mode = 'pen';
        let useRuler = false;
        let startX, startY;

        function initLayerSystem() {
            const container = document.getElementById('canvas-container');
            container.innerHTML = '';
            layers = [];
            addLayer();
            window.canvasInit = true;
        }

        function addLayer() {
            if (layers.length >= 15) return;
            playThud();
            const canvas = document.createElement('canvas');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            canvas.style.zIndex = layers.length;
            document.getElementById('canvas-container').appendChild(canvas);
            
            const layer = {
                canvas: canvas,
                ctx: canvas.getContext('2d'),
                visible: true,
                history: []
            };
            layers.push(layer);
            setActiveLayer(layers.length - 1);
            updateLayerPanel();
        }

        function setActiveLayer(index) {
            activeLayerIndex = index;
            layers.forEach((l, i) => {
                l.canvas.style.pointerEvents = (i === index) ? 'auto' : 'none';
            });
            // Re-attach listeners to top active layer
            const c = layers[index].canvas;
            c.onmousedown = startDraw;
            c.onmousemove = drawMove;
            c.onmouseup = stopDraw;
            updateLayerPanel();
        }

        function startDraw(e) {
            isDrawing = true;
            startX = e.clientX; startY = e.clientY;
            const ctx = layers[activeLayerIndex].ctx;
            ctx.beginPath();
            ctx.moveTo(startX, startY);
            playFriction(true);
        }

        function drawMove(e) {
            if (!isDrawing) return;
            const l = layers[activeLayerIndex];
            const ctx = l.ctx;
            ctx.lineWidth = document.getElementById('pen-size').value;
            ctx.lineCap = 'round';
            ctx.strokeStyle = (mode === 'eraser') ? '#fdfdfd' : document.getElementById('pen-color').value;
            
            if (!useRuler) {
                ctx.lineTo(e.clientX, e.clientY);
                ctx.stroke();
            }
        }

        function stopDraw(e) {
            if (useRuler && isDrawing) {
                const ctx = layers[activeLayerIndex].ctx;
                ctx.lineTo(e.clientX, e.clientY);
                ctx.stroke();
            }
            isDrawing = false;
            playFriction(false);
        }

        function updateLayerPanel() {
            const list = document.getElementById('layers-list');
            list.innerHTML = '';
            layers.slice().reverse().forEach((l, i) => {
                const realIdx = layers.length - 1 - i;
                const item = document.createElement('div');
                item.className = `layer-item ${realIdx === activeLayerIndex ? 'layer-active' : ''}`;
                item.innerHTML = `
                    <span onclick="setActiveLayer(${realIdx})">Layer ${realIdx + 1}</span>
                    <span onclick="toggleLayerVis(${realIdx})">${l.visible ? '👁' : '◌'}</span>
                    <span onclick="deleteLayer(${realIdx})">×</span>
                `;
                list.appendChild(item);
            });
        }

        function toggleLayerVis(idx) {
            layers[idx].visible = !layers[idx].visible;
            layers[idx].canvas.style.display = layers[idx].visible ? 'block' : 'none';
            updateLayerPanel();
        }

        function deleteLayer(idx) {
            if (layers.length <= 1) return;
            document.getElementById('canvas-container').removeChild(layers[idx].canvas);
            layers.splice(idx, 1);
            setActiveLayer(Math.max(0, idx - 1));
        }

        function setMode(m) { mode = m; useRuler = false; playThud(); }
        function toggleRuler() { useRuler = !useRuler; document.getElementById('ruler-btn').style.color = useRuler ? '#000' : '#888'; playThud(); }

        // --- REST TEXT ---
        function spawnRestText(e) {
            const t = document.createElement('div');
            t.className = 'floating-text';
            t.style.left = e.clientX + 'px';
            t.style.top = e.clientY + 'px';
            t.style.color = '#333';
            t.innerText = "I love 15/16";
            document.getElementById('screen-rest').appendChild(t);
            setTimeout(() => t.remove(), 3000);
        }

        // --- SETTING & TYPING ---
        function settingTrigger(msg) {
            const t = document.createElement('div');
            t.className = 'floating-text';
            t.style.bottom = '20%'; t.style.left = '50%'; t.style.transform = 'translateX(-50%)';
            t.innerText = msg;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 3000);
        }

        document.getElementById('memo-area').oninput = () => {
            // Typing sounds remain standard light sine for clarity
            const osc = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            osc.frequency.value = 400 + Math.random() * 100;
            g.gain.setValueAtTime(0.02, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
            osc.connect(g); g.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.05);
        };
    </script>
</body>
</html>
