<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World</title>
    <style>
        :root {
            /* Morandi Palette */
            --bg-dark: #2c2c2c;
            --bg-light: #f4f4f4;
            --paper: #fdfdfd;
            --morandi-gray: #9ca3af;
            --morandi-blue: #b4c4d5;
            --morandi-sage: #c1cdc1;
            --text-main: #333333;
            --glass: rgba(255, 255, 255, 0.12);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Helvetica Neue', sans-serif;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            height: 100%;
            overflow: hidden;
            background: #000;
        }

        /* --- Animations --- */
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes fadeOut {
            0% { opacity: 0; transform: translateY(10px); }
            15% { opacity: 1; transform: translateY(0); }
            85% { opacity: 1; }
            100% { opacity: 0; transform: translateY(-20px); }
        }

        /* --- Universal UI --- */
        .screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .active { display: flex; opacity: 1; }

        .exit-btn {
            position: absolute;
            top: 40px;
            left: 40px;
            cursor: pointer;
            font-size: 0.7rem;
            letter-spacing: 3px;
            color: var(--text-main);
            border-bottom: 1px solid rgba(0,0,0,0.1);
            z-index: 100;
            transition: 0.3s;
        }
        .exit-btn:hover { border-bottom: 1px solid var(--text-main); }

        /* --- HOME --- */
        #screen-home {
            background: linear-gradient(-45deg, #1a1a1a, #4a4a4a, #ffffff, #d3d3d3);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }

        .title {
            position: absolute;
            top: 15%;
            font-size: 3.5rem;
            font-weight: 100;
            letter-spacing: 15px;
            color: #fff;
            mix-blend-mode: difference;
        }

        .glass-container {
            background: var(--glass);
            backdrop-filter: blur(15px);
            padding: 60px 80px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
        }

        .menu-item {
            list-style: none;
            margin: 25px 0;
            font-size: 0.9rem;
            letter-spacing: 5px;
            color: #444;
            cursor: pointer;
            transition: 0.4s;
            text-align: center;
        }
        .menu-item:hover { color: #000; transform: translateY(-2px); }

        /* --- START (Drawing) --- */
        #screen-start { background: var(--paper); }
        
        canvas { cursor: crosshair; touch-action: none; }

        .toolbar {
            position: absolute;
            bottom: 40px;
            display: flex;
            gap: 20px;
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(10px);
            padding: 12px 25px;
            border-radius: 2px;
            align-items: center;
            border: 1px solid #eee;
        }

        .tool-icon { font-size: 0.7rem; letter-spacing: 1px; cursor: pointer; color: #888; transition: 0.3s; }
        .tool-icon:hover, .active-tool { color: #000; }

        input[type="color"] { border: none; width: 20px; height: 20px; background: none; cursor: pointer; }
        input[type="range"] { width: 60px; accent-color: #999; }

        /* --- REST --- */
        #screen-rest {
            background: linear-gradient(to bottom, #111, #fff);
            cursor: crosshair;
        }
        .floating-text {
            position: absolute;
            font-weight: 200;
            font-size: 0.9rem;
            letter-spacing: 2px;
            pointer-events: none;
            animation: fadeOut 3s forwards;
            color: var(--text-main);
        }

        /* --- END (Memo) --- */
        #screen-end { background: #f9f9f9; }
        .memo-wrap { width: 70%; max-width: 700px; height: 50%; }
        textarea {
            width: 100%; height: 100%; border: none; outline: none;
            background: transparent; font-size: 1.2rem; line-height: 1.8;
            color: #555; resize: none; font-weight: 300;
        }

        /* --- SETTING --- */
        #screen-setting { background: #efefef; }
        .setting-opt { margin: 20px; letter-spacing: 3px; font-size: 0.8rem; color: #888; cursor: pointer; transition: 0.3s; }
        .setting-opt:hover { color: #000; }

        .status-bar {
            position: absolute;
            bottom: 30px;
            right: 40px;
            font-size: 0.6rem;
            letter-spacing: 2px;
            color: #aaa;
            font-weight: 200;
        }
    </style>
</head>
<body>

    <section id="screen-home" class="screen active">
        <h1 class="title">WORLD</h1>
        <div class="glass-container">
            <div class="menu-item" onclick="nav('screen-start')">START</div>
            <div class="menu-item" onclick="nav('screen-rest')">REST</div>
            <div class="menu-item" onclick="nav('screen-end')">END</div>
            <div class="menu-item" onclick="nav('screen-setting')">SETTING</div>
        </div>
        <div class="status-bar" id="time-display">00:00:00</div>
    </section>

    <section id="screen-start" class="screen">
        <div class="exit-btn" onclick="nav('screen-home')">BACK</div>
        <canvas id="canvas"></canvas>
        <div class="toolbar">
            <span id="mode-hint" style="font-size: 0.6rem; color: #bbb; margin-right:10px;">FREE MODE</span>
            <input type="color" id="color" value="#6d7a71"> <input type="range" id="size" min="1" max="30" value="2">
            <span class="tool-icon" onclick="setTool('pen')">PEN</span>
            <span class="tool-icon" onclick="setTool('eraser')">ERASER</span>
            <span class="tool-icon" onclick="setTool('ruler')">RULER</span>
            <span class="tool-icon" onclick="undo()">UNDO</span>
            <span class="tool-icon" onclick="saveCanvas()">SAVE</span>
        </div>
    </section>

    <section id="screen-rest" class="screen" onclick="spawnText(event)">
        <div class="exit-btn" onclick="nav('screen-home')">BACK</div>
        <div style="color: rgba(255,255,255,0.2); font-weight:100; letter-spacing:10px;">SILENCE</div>
    </section>

    <section id="screen-end" class="screen">
        <div class="exit-btn" onclick="nav('screen-home')">BACK</div>
        <div class="memo-wrap">
            <input type="range" min="12" max="40" value="18" oninput="document.getElementById('note').style.fontSize = this.value+'px'" style="margin-bottom:30px;">
            <textarea id="note" placeholder="Write down your thoughts..."></textarea>
        </div>
    </section>

    <section id="screen-setting" class="screen">
        <div class="exit-btn" onclick="nav('screen-home')">BACK</div>
        <div class="setting-opt" onclick="nav('screen-home')">FRUIT CUP</div>
        <div class="setting-opt" onclick="toast('I love you')">MANGO</div>
        <div class="setting-opt" onclick="toast('I love you too')">GRAPE</div>
    </section>

    <script>
        // --- Core Navigation & Atmosphere ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playTone(freq, type, duration) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.value = freq;
            gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        function nav(id) {
            playTone(200, 'sine', 0.5);
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'screen-start') initCanvas();
        }

        // Time Display
        setInterval(() => {
            const now = new Date();
            document.getElementById('time-display').innerText = now.toLocaleTimeString('en-GB');
        }, 1000);

        // --- Drawing Logic ---
        let canvas, ctx, drawing = false, tool = 'pen', history = [];
        let startX, startY;

        function initCanvas() {
            canvas = document.getElementById('canvas');
            ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            saveState();

            canvas.addEventListener('mousedown', start);
            canvas.addEventListener('mousemove', move);
            canvas.addEventListener('mouseup', end);
            canvas.addEventListener('touchstart', (e) => start(e.touches[0]));
            canvas.addEventListener('touchmove', (e) => move(e.touches[0]));
            canvas.addEventListener('touchend', end);
        }

        function start(e) {
            drawing = true;
            startX = e.clientX;
            startY = e.clientY;
            ctx.beginPath();
            ctx.moveTo(startX, startY);
            if(tool === 'pen') playTone(400, 'triangle', 0.1);
        }

        function move(e) {
            if (!drawing) return;
            ctx.lineWidth = document.getElementById('size').value;
            ctx.strokeStyle = (tool === 'eraser') ? '#fdfdfd' : document.getElementById('color').value;
            
            if (tool !== 'ruler') {
                ctx.lineTo(e.clientX, e.clientY);
                ctx.stroke();
            }
        }

        function end(e) {
            if (tool === 'ruler' && drawing) {
                const ex = e.clientX || e.changedTouches[0].clientX;
                const ey = e.clientY || e.changedTouches[0].clientY;
                ctx.lineTo(ex, ey);
                ctx.stroke();
            }
            drawing = false;
            saveState();
        }

        function setTool(t) {
            tool = t;
            document.getElementById('mode-hint').innerText = t.toUpperCase() + " MODE";
            document.querySelectorAll('.tool-icon').forEach(el => el.classList.remove('active-tool'));
        }

        function saveState() {
            if (history.length > 20) history.shift();
            history.push(canvas.toDataURL());
        }

        function undo() {
            if (history.length > 1) {
                history.pop();
                let img = new Image();
                img.src = history[history.length - 1];
                img.onload = () => {
                    ctx.clearRect(0,0,canvas.width, canvas.height);
                    ctx.drawImage(img, 0, 0);
                }
            }
        }

        function saveCanvas() {
            const link = document.createElement('a');
            link.download = 'world_sketch.png';
            link.href = canvas.toDataURL();
            link.click();
        }

        // --- Rest Logic ---
        const quotes = ["I love 15/16", "Silence", "Breath", "Space", "Drift"];
        function spawnText(e) {
            playTone(800, 'sine', 1);
            const t = document.createElement('div');
            t.className = 'floating-text';
            t.innerText = quotes[Math.floor(Math.random()*quotes.length)];
            t.style.left = e.clientX + 'px';
            t.style.top = e.clientY + 'px';
            document.getElementById('screen-rest').appendChild(t);
            setTimeout(() => t.remove(), 3000);
        }

        // --- Misc ---
        function toast(msg) {
            const div = document.createElement('div');
            div.className = 'floating-text';
            div.style.bottom = '20%';
            div.style.left = '50%';
            div.style.transform = 'translateX(-50%)';
            div.innerText = msg;
            document.body.appendChild(div);
            playTone(600, 'sine', 0.3);
            setTimeout(() => div.remove(), 3000);
        }

        // Typing sound for Memo
        document.getElementById('note').addEventListener('input', () => {
            playTone(150, 'sine', 0.05);
        });
    </script>
</body>
</html>
